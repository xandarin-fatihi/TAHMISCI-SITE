<!DOCTYPE html>
<html lang="tr">
<head>
  <!-- Developer: Uzeyir | System Key: xandar | Source integrity marker -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#031108">
  <title>TAHMİSÇİ Local Reçete</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@400;600;800&family=Playfair+Display+SC:wght@700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../../favicon.png?v=20260606c">
  <link rel="stylesheet" href="recete.css?v=20260610a">
  <script src="../../recipe-data.js?v=20260517" defer></script>
  <script src="recete.js?v=20260606b" defer></script>
</head>
<body class="recipe-locked">
  <section class="recipe-gate" id="recipeGate">
    <form class="recipe-gate-card" id="recipeGateForm">
      <img src="../../images/PNG_Logo.png" alt="TAHMİSÇİ">
      <p>TAHMİSÇİ Coffee</p>
      <h1>Local Reçete</h1>
      <label>
        <span>Local PIN</span>
        <input id="recipeGatePassword" type="password" inputmode="numeric" pattern="[0-9]*" autocomplete="current-password" placeholder="2135">
      </label>
      <button type="submit">Giriş Yap</button>
      <small id="recipeGateError" hidden>PIN hatali. Lutfen tekrar deneyin.</small>
    </form>
  </section>

  <main class="recipe-shell">
    <header class="recipe-header">
      <div class="recipe-topbar">
        <a class="recipe-logo-box" href="../../index.html" aria-label="Menü ana sayfası">
          <img src="../../images/PNG_Logo.png" alt="TAHMİSÇİ">
        </a>
        <div class="recipe-title-block">
          <p>TAHMİSÇİ Coffee</p>
          <h1>REÇETE</h1>
        </div>
        <button class="theme-toggle" type="button" data-action="theme" aria-label="Tema değiştir">
          <img src="https://cdn-icons-png.flaticon.com/512/702/702471.png" id="recipeModeIcon" alt="">
        </button>
      </div>

      <div class="recipe-tools">
        <div class="recipe-search">
          <span class="search-icon" aria-hidden="true"></span>
          <input id="recipeSearch" type="search" autocomplete="off" placeholder="reçetede ara" aria-label="Reçetede ara">
          <div class="recipe-suggestions" id="recipeSuggestions" hidden></div>
        </div>
      </div>

      <nav class="recipe-tabs" id="recipeTabs" aria-label="Reçete kategorileri"></nav>
    </header>

    <section class="recipe-grid" id="recipeGrid" aria-live="polite"></section>
    <p class="empty-state" id="recipeEmpty" hidden>Bu aramada reçete bulunamadı.</p>
  </main>

  <div class="recipe-modal-overlay" id="recipeModal" aria-hidden="true">
    <article class="recipe-modal" role="dialog" aria-modal="true" aria-labelledby="recipeModalTitle">
      <button class="recipe-close" type="button" data-action="close-recipe" aria-label="Kapat">&times;</button>
      <p class="recipe-modal-kicker" id="recipeModalCategory"></p>
      <h2 id="recipeModalTitle"></h2>
      <span class="recipe-size-pill" id="recipeModalSize"></span>
      <ul class="recipe-steps" id="recipeModalSteps"></ul>
    </article>
  </div>

  <noscript>Reçete ekranının çalışması için JavaScript etkin olmalıdır.</noscript>
</body>
</html>
