<!doctype html>
<html lang="tr">
<head>
  <!-- Developer: Uzeyir | System Key: xandar | Email password reset page marker -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tahmisci Sifre Sifirlama</title>
  <style>
    :root {
      --bg: #06130c;
      --card: #0d2014;
      --ink: #f7fff2;
      --muted: #c9d8bf;
      --line: rgba(228, 242, 201, 0.22);
      --accent: #e4f2c9;
      --accent-ink: #203a29;
      --danger: #ff9b8f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      margin: 0;
      padding: 24px;
      background: linear-gradient(150deg, #010302, var(--bg) 54%, #12331f);
      color: var(--ink);
      font-family: Inter, Arial, sans-serif;
    }

    main {
      width: min(480px, 100%);
      display: grid;
      gap: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      padding: 28px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: 30px;
      line-height: 1.1;
    }

    p {
      color: var(--muted);
      line-height: 1.55;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    input,
    select,
    button {
      min-height: 44px;
      border-radius: 7px;
      font: inherit;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      background: #102b1b;
      color: var(--ink);
      outline: none;
      padding: 10px 12px;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(228, 242, 201, 0.14);
    }

    button {
      border: 0;
      background: var(--accent);
      color: var(--accent-ink);
      font-weight: 850;
      cursor: pointer;
    }

    button.secondary {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--accent);
    }

    button:disabled {
      cursor: progress;
      opacity: 0.72;
    }

    .status {
      min-height: 22px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }

    .status.is-error {
      color: var(--danger);
    }

    .step {
      display: grid;
      gap: 14px;
    }

    .hint {
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <div>
      <p>Tahmisci Coffee</p>
      <h1>Sifre degistirme</h1>
    </div>
    <p>Yetkili e-posta adresine gelen dogrulama koduyla panel veya recete sifresini degistirin.</p>

    <form id="requestForm" class="step">
      <label>
        Yetkili e-posta
        <input id="emailInput" type="email" autocomplete="email" required autofocus>
      </label>
      <button type="submit">Dogrulama kodu gonder</button>
    </form>

    <form id="confirmForm" class="step" hidden>
      <label>
        Degistirilecek sifre
        <select id="scopeInput" required>
          <option value="admin">Panel sifresi</option>
          <option value="recipe">Recete sifresi</option>
        </select>
      </label>
      <label>
        Dogrulama kodu
        <input id="codeInput" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" pattern="[0-9]{6}" required>
      </label>
      <label>
        Yeni sifre
        <input id="newPasswordInput" type="password" autocomplete="new-password" minlength="10" required>
      </label>
      <button type="submit">Sifreyi degistir</button>
      <button class="secondary" id="sendAgainButton" type="button">Kodu tekrar gonder</button>
      <p class="hint">Sifre en az 10 karakter olmali, harf ve rakam icermeli.</p>
    </form>

    <div class="status" id="status" role="status" aria-live="polite">Hazir</div>
  </main>

  <script>
    const requestForm = document.getElementById("requestForm");
    const confirmForm = document.getElementById("confirmForm");
    const emailInput = document.getElementById("emailInput");
    const scopeInput = document.getElementById("scopeInput");
    const codeInput = document.getElementById("codeInput");
    const newPasswordInput = document.getElementById("newPasswordInput");
    const sendAgainButton = document.getElementById("sendAgainButton");
    const statusBox = document.getElementById("status");

    requestForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      await requestCode();
    });

    sendAgainButton.addEventListener("click", requestCode);

    confirmForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setBusy(confirmForm, true);
      showStatus("Sifre guncelleniyor...");

      try {
        const response = await fetch("/api/admin/password-reset/confirm", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: emailInput.value,
            scope: scopeInput.value,
            code: codeInput.value,
            newPassword: newPasswordInput.value
          })
        });
        const result = await response.json().catch(() => ({}));
        showStatus(result.message || (response.ok ? "Sifre guncellendi." : "Islem basarisiz."), !response.ok);
        if (response.ok) {
          const nextUrl = scopeInput.value === "recipe" ? "/recete/" : "/panel/";
          confirmForm.reset();
          window.setTimeout(() => {
            window.location.href = nextUrl;
          }, 1400);
        }
      } catch (error) {
        showStatus(error.message || "Backend baglantisi kurulamadi.", true);
      } finally {
        setBusy(confirmForm, false);
      }
    });

    async function requestCode() {
      setBusy(requestForm, true);
      setBusy(confirmForm, true);
      showStatus("Kod gonderiliyor...");

      try {
        const response = await fetch("/api/admin/password-reset/request", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: emailInput.value })
        });
        const result = await response.json().catch(() => ({}));
        showStatus(result.message || (response.ok ? "Kod gonderildi." : "Islem basarisiz."), !response.ok);
        if (response.ok) {
          confirmForm.hidden = false;
          window.setTimeout(() => codeInput.focus(), 60);
        }
      } catch (error) {
        showStatus(error.message || "Backend baglantisi kurulamadi.", true);
      } finally {
        setBusy(requestForm, false);
        setBusy(confirmForm, false);
      }
    }

    function showStatus(message, isError) {
      statusBox.textContent = message;
      statusBox.classList.toggle("is-error", Boolean(isError));
    }

    function setBusy(form, busy) {
      Array.from(form.querySelectorAll("button")).forEach((button) => {
        button.disabled = busy;
      });
    }
  </script>
</body>
</html>
