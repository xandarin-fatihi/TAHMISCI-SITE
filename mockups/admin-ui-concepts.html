  <script>
    const screens=[
      ["overview","Genel Bakış","⌂"],["menu","Menü Düzenleme","☰"],["banner","Banner Düzenleme","▣"],["category","Kategori Düzenleme","▤"],["product","Ürün Düzenleme","◇"],["bulk","Toplu Fiyat Güncelleme","%"],["output","Menü Çıktısı","TV"],["recipe","Reçete Düzenleme","R"],["site","Site Düzenleme","●"],["mudavim","Müdavimler","M"],["reports","Raporlar","▥"],["settings","Ayarlar","⚙"]
    ];
    const q=new URLSearchParams(location.search);const screen=q.get("screen")||"overview";
    const action=(primary="Kaydet ve Yayınla",secondary="Önizlemeyi Aç")=>`<button class="btn primary">${primary}</button><button class="btn">${secondary} ↗</button>`;
    const field=(name,value="")=>`<label class="field"><span>${name}</span><div class="fake-input">${value||"Seçiniz"}</div></label>`;
    const metric=(icon,label,value,sub="")=>`<article class="panel metric"><span class="ico">${icon}</span><div><small>${label}</small><strong>${value}</strong>${sub?`<small>${sub}</small>`:""}</div></article>`;
    const row=(title,meta,right="›")=>`<div class="row"><div><b>${title}</b><small>${meta}</small></div><strong>${right}</strong></div>`;
    const listItem=(title,meta,badge="",on=false)=>`<div class="list-item ${on?"on":""}"><span class="thumb">${title.slice(0,1)}</span><div><b>${title}</b><small>${meta}</small></div>${badge?`<span class="chip">${badge}</span>`:""}</div>`;
    const defs={
      overview:{k:"Dashboard",a:action(),html:`<div class="grid cards-5">${metric("▱","Toplam Kategori","7")}${metric("◇","Toplam Ürün","215")}${metric("✓","Aktif Ürün","215")}${metric("R","Reçete Ürünü","77")}${metric("☕","Canlı Menü","Açık")}</div><div class="grid cols-3 mt h-330"><article class="panel"><h3>Kategorilere Göre Ürün Dağılımı</h3><div class="center"><div class="donut"></div><div class="legend"><div><span><i></i> Soğuklar</span><b>%40</b></div><div><span><i></i> Sıcaklar</span><b>%27</b></div><div><span><i></i> Tatlı & Sandwich</span><b>%19</b></div><div><span><i></i> Diğer</span><b>%14</b></div></div></div></article><article class="panel"><h3>Son Güncellemeler</h3>${row("Menü verisi güncel","215 ürün")}${row("Kategoriler hazır","7 kategori")}${row("Reçeteler eşitlendi","77 reçete ürünü")}${row("Müdavim özeti hazır","5 kayıt")}</article><article class="panel"><h3>Kısa Yollar</h3>${row("Menü Düzenle","Görünüm ve tema")}${row("Ürün Ekle","Ürün editörüne git")}${row("Banner Ekle","Sunu alanını yönet")}${row("Reçete Yönetimi","Reçeteleri aç")}</article></div><div class="grid cols-preview mt h-270"><article class="panel"><div class="panel-head"><h3>Ziyaretçi Trendi</h3><small>Son 7 gün · 6 ziyaret</small></div><div class="mini-chart"></div></article><article class="panel"><div class="panel-head"><h3>Müdavim Özeti</h3><span class="chip">Tümünü Gör</span></div><div class="grid cards-4" style="grid-template-columns:repeat(3,1fr)">${metric("M","Toplam Müdavim","5").replace('panel metric','metric')}${metric("7","Son 7 Gün","6").replace('panel metric','metric')}${metric("↗","Toplam Ziyaret","96").replace('panel metric','metric')}</div></article></div>`},
