<!doctype html>
<html lang="tr">
<head>
  <!-- Developer: Uzeyir | System Key: xandar | Password manager page marker -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tahmisci Panel Sifre Ayari</title>
  <style>
    :root {
      --bg: #f6f8f5;
      --card: #ffffff;
      --ink: #152016;
      --muted: #667066;
      --line: #dce4dd;
      --accent: #3f592c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background: var(--bg);
      font-family: Inter, Arial, sans-serif;
    }

    main {
      width: min(460px, 100%);
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      box-shadow: 0 24px 60px rgba(20, 32, 22, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: grid;
      gap: 7px;
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      color: var(--ink);
      font: inherit;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 12px 14px;
      color: #fff;
      background: var(--accent);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .status {
      margin-top: 14px;
      padding: 11px 12px;
      border-radius: 8px;
      background: #eef4ee;
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Panel sifresi</h1>
    <p>Bu sayfa backend domaininde calisir. Yetkili anahtari bilen kisiler admin panel sifresini buradan degistirir.</p>

    <form id="passwordForm">
      <label>
        Yetkili anahtari
        <input name="managerKey" type="password" autocomplete="off" required>
      </label>
      <label>
        Yeni panel sifresi
        <input name="newPassword" type="password" autocomplete="new-password" minlength="10" required>
      </label>
      <button type="submit">Sifreyi guncelle</button>
    </form>

    <div class="status" id="status">Hazir</div>
  </main>

  <script>
    const form = document.getElementById("passwordForm");
    const statusBox = document.getElementById("status");
    const submitButton = form.querySelector("button[type='submit']");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      statusBox.textContent = "Guncelleniyor...";
      submitButton.disabled = true;

      try {
        const formData = new FormData(form);
        const newPassword = String(formData.get("newPassword") || "");

        if (newPassword.length < 10 || !/[a-zA-Z]/.test(newPassword) || !/\d/.test(newPassword)) {
          statusBox.textContent = "Sifre en az 10 karakter olmali, harf ve rakam icermeli.";
          return;
        }

        const response = await fetch("/api/admin/password", {
          method: "POST",
          credentials: "include",
          headers: {
            "Content-Type": "application/json",
            "X-Manager-Key": formData.get("managerKey")
          },
          body: JSON.stringify({
            newPassword
          })
        });

        const result = await response.json().catch(() => ({}));
        statusBox.textContent = result.message || (response.ok ? "Sifre guncellendi." : "Islem basarisiz.");

        if (response.ok) form.reset();
      } catch (error) {
        statusBox.textContent = error.message || "Backend baglantisi kurulamadi.";
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
