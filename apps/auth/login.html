<!doctype html>
<html lang="tr">
<head>
  <!-- Developer: Uzeyir | System Key: xandar | Admin login markup marker -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tahmisci Admin Giris</title>
  <link rel="icon" type="image/png" href="/assets/brand/favicon.png?v=20260714">
  <style>
    :root {
      --bg: #06130c;
      --card: #0d2014;
      --ink: #f7fff2;
      --muted: #c9d8bf;
      --line: rgba(228, 242, 201, 0.22);
      --accent: #e4f2c9;
      --danger: #ff9b8f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      margin: 0;
      padding: 24px;
      background: linear-gradient(150deg, #010302, var(--bg) 54%, #12331f);
      color: var(--ink);
      font-family: Inter, Arial, sans-serif;
    }

    main {
      width: min(430px, 100%);
      display: grid;
      gap: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      padding: 28px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: 30px;
      line-height: 1.1;
    }

    p {
      color: var(--muted);
      line-height: 1.55;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    input,
    button {
      min-height: 44px;
      border-radius: 7px;
      font: inherit;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      background: #102b1b;
      color: var(--ink);
      outline: none;
      padding: 10px 12px;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(228, 242, 201, 0.14);
    }

    button {
      border: 0;
      background: var(--accent);
      color: #203a29;
      font-weight: 850;
      cursor: pointer;
    }

    .status {
      min-height: 22px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <div>
      <p>Tahmisci Coffee</p>
      <h1>Admin Panel Girisi</h1>
    </div>
    <p>Panel oturumu backend uzerinden dogrulanir. Basarili giriste guvenli cookie ve kisa omurlu JWT olusturulur.</p>

    <form id="loginForm">
      <label>
        Panel sifresi
        <input id="passwordInput" type="password" autocomplete="current-password" required autofocus>
      </label>
      <button type="submit">Panele Gir</button>
      <div class="status" id="status" role="status" aria-live="polite"></div>
    </form>
  </main>

  <script>
    const TOKEN_KEY = "tahmisci.backend.panel.token";
    const AUTH_KEY = "tahmisci.panel.auth";
    const form = document.getElementById("loginForm");
    const passwordInput = document.getElementById("passwordInput");
    const statusBox = document.getElementById("status");
    const submitButton = form.querySelector("button[type='submit']");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      statusBox.textContent = "Dogrulaniyor...";
      submitButton.disabled = true;

      try {
        const response = await fetch("/api/admin/login", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: passwordInput.value })
        });

        const result = await response.json().catch(() => ({}));

        if (!response.ok || result.ok === false || !result.token) {
          throw new Error(result.message || "Giris basarisiz.");
        }

        window.sessionStorage.setItem(TOKEN_KEY, result.token);
        window.sessionStorage.setItem(AUTH_KEY, "ok");
        window.location.href = safeNextUrl();
      } catch (error) {
        statusBox.textContent = error.message || "Giris basarisiz.";
        passwordInput.value = "";
        passwordInput.select();
      } finally {
        submitButton.disabled = false;
      }
    });

    function safeNextUrl() {
      const fallback = "/panel/";
      const value = new URLSearchParams(window.location.search).get("next") || fallback;
      if (!value.startsWith("/") || value.startsWith("//")) return fallback;
      return value;
    }
  </script>
</body>
</html>
